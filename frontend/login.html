<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocuMind – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: #238636;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-text { font-size: 1.3rem; font-weight: 600; }
    .logo-text span { color: #3fb950; }

    h2 { font-size: 1.1rem; font-weight: 500; color: #8b949e; text-align: center; margin-bottom: 28px; }

    .tabs {
      display: flex;
      background: #0d1117;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }

    .tab {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      background: transparent; color: #8b949e;
      font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }

    .tab.active { background: #238636; color: #fff; }

    .field { margin-bottom: 16px; }

    label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 6px; }

    input {
      width: 100%; padding: 10px 14px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      color: #e6edf3; font-family: 'Outfit', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }

    input:focus { border-color: #238636; }

    .btn {
      width: 100%; padding: 11px;
      background: #238636; border: none; border-radius: 8px;
      color: #fff; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }

    .btn:hover { background: #2ea043; }
    .btn:disabled { background: #1b2a1e; color: #3fb950; cursor: not-allowed; }

    .msg {
      margin-top: 14px; padding: 10px 14px;
      border-radius: 8px; font-size: 0.88rem; display: none;
    }
    .msg.error { background: #2d1117; border: 1px solid #f85149; color: #f85149; display: block; }
    .msg.success { background: #0d2119; border: 1px solid #3fb950; color: #3fb950; display: block; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 40 40" fill="none"><path d="M10 14h20M10 20h14M10 26h17" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><circle cx="30" cy="26" r="5" fill="#fff" opacity="0.9"/></svg>
    </div>
    <div class="logo-text">Docu<span>Mind</span></div>
  </div>

  <h2>Your private AI document assistant</h2>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn" onclick="login()">Sign In</button>
  </div>

  <div id="signupForm" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
    </div>
    <button class="btn" onclick="signup()">Create Account</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  const { createClient } = supabase;
  const _supabase = createClient('SUPABASE_URL_PLACEHOLDER', 'SUPABASE_ANON_KEY_PLACEHOLDER');

  // If already logged in, go to app
  _supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = '/';
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
  }

  async function login() {
    const btn = document.querySelector('#loginForm .btn');
    btn.dataset.label = btn.dataset.label || btn.textContent;
    setLoading(btn, true);
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    setLoading(btn, false);
    if (error) { showMsg(error.message, 'error'); return; }
    window.location.href = '/';
  }

  async function signup() {
    const btn = document.querySelector('#signupForm .btn');
    btn.dataset.label = btn.dataset.label || btn.textContent;
    setLoading(btn, true);
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const { error } = await _supabase.auth.signUp({ email, password });
    setLoading(btn, false);
    if (error) { showMsg(error.message, 'error'); return; }
    showMsg('Account created! Check your email to confirm, then sign in.', 'success');
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('signupForm').style.display === 'none') login();
    else signup();
  });
</script>
</body>
</html>
