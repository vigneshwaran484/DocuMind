<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocuMind – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-app: #0f172a;
      --bg-gradient: radial-gradient(circle at top right, rgba(16, 185, 129, 0.15) 0%, transparent 40%),
                     radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                     var(--bg-app);
      
      --glass-bg: rgba(30, 41, 59, 0.4);
      --glass-bg-hover: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-focus: rgba(16, 185, 129, 0.4);
      --glass-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
      
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --danger: #ef4444;
      
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --radius: 12px;
      --font-sans: 'Outfit', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--glass-shadow);
      z-index: 10;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      justify-content: center;
      font-weight: 700;
      font-size: 24px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .logo svg {
      width: 38px; height: 38px;
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }

    .logo span {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      margin-left: 6px;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    h2 {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
      border: 1px solid var(--glass-border);
    }

    .tab {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      background: transparent; color: var(--text-secondary);
      font-family: var(--font-sans); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent) 0%, #059669 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .field { margin-bottom: 20px; }

    label { display: block; font-size: 0.88rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }

    input {
      width: 100%; padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); border-radius: var(--radius);
      color: var(--text-primary); font-family: var(--font-sans); font-size: 1rem;
      outline: none; transition: all 0.3s ease;
    }

    input:focus {
      border-color: var(--glass-border-focus);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #059669 100%); border: none; border-radius: var(--radius);
      color: #fff; font-family: var(--font-sans); font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

    .msg {
      margin-top: 20px; padding: 12px 16px;
      border-radius: var(--radius); font-size: 0.9rem; display: none;
      line-height: 1.5;
    }
    .msg.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: #fca5a5; display: block; }
    .msg.success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); color: #a7f3d0; display: block; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="12" fill="var(--accent)"/>
      <path d="M10 14h20M10 20h14M10 26h17" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="30" cy="26" r="5" fill="#fff" opacity="0.9"/>
    </svg>
    DocuMind <span>AI</span>
  </div>

  <h2>Your private AI document assistant</h2>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn" onclick="login()">Sign In</button>
  </div>

  <div id="signupForm" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
    </div>
    <button class="btn" onclick="signup()">Create Account</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  const { createClient } = supabase;
  let _supabase = null;

  async function initSupabase() {
    try {
      const res = await fetch('/api/config');
      const config = await res.json();
      _supabase = createClient(config.supabase_url, config.supabase_key);
    } catch (e) {
      console.error("Failed to load config from backend", e);
      _supabase = createClient('SUPABASE_URL_PLACEHOLDER', 'SUPABASE_ANON_KEY_PLACEHOLDER');
    }
    
    // Check if session already exists
    const { data } = await _supabase.auth.getSession();
    if (data.session) window.location.href = '/';
  }

  const initPromise = initSupabase();

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
  }

  async function login() {
    await initPromise;
    const btn = document.querySelector('#loginForm .btn');
    btn.dataset.label = btn.dataset.label || btn.textContent;
    setLoading(btn, true);
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    setLoading(btn, false);
    if (error) { showMsg(error.message, 'error'); return; }
    window.location.href = '/';
  }

  async function signup() {
    await initPromise;
    const btn = document.querySelector('#signupForm .btn');
    btn.dataset.label = btn.dataset.label || btn.textContent;
    setLoading(btn, true);
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const { error } = await _supabase.auth.signUp({ email, password });
    setLoading(btn, false);
    if (error) { showMsg(error.message, 'error'); return; }
    showMsg('Account created! Check your email to confirm, then sign in.', 'success');
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('signupForm').style.display === 'none') login();
    else signup();
  });
</script>
</body>
</html>
